# trust_ledger.yaml
# Agentic AI Trust Ledger — tool registration and governance controls
# All agent tools must be registered here before use.
# Tools not listed are implicitly DENIED.

schema_version: "1.0"
last_reviewed: "2026-05-11"
reviewed_by: "AI Governance Officer"

execution_identity:
  iam_role: "audit-readonly-role"
  privilege_scope: "read-only"
  credential_source: "short-lived-session"
  impersonation_allowed: false

tools:

  - tool_id: "T-001"
    tool_name: "query_iam_policies"
    description: "Read IAM policy documents for a given AWS account scope."
    risk_tier: LOW
    autonomy_class: AUTONOMOUS
    human_review_required: false
    evidence_lineage_required: true
    required_evidence_fields:
      - source_uri
      - retrieval_timestamp
      - evidence_hash
    required_approver_role: null
    allowed_actions:
      - "iam:GetPolicy"
      - "iam:GetPolicyVersion"
      - "iam:ListAttachedRolePolicies"
    prohibited_actions:
      - "iam:CreatePolicy"
      - "iam:DeletePolicy"
      - "iam:AttachRolePolicy"
    data_classifications_allowed:
      - UNCLASSIFIED
      - CUI
    policy_enforcement_points:
      pre_call: "validate_scope_bounds"
      post_call: "sanitize_account_identifiers"
    max_calls_per_run: 20
    timeout_seconds: 10
    audit_retention_days: 365

  - tool_id: "T-002"
    tool_name: "submit_assessment_artifact"
    description: "Writes a draft control assessment to the designated output store."
    risk_tier: HIGH
    autonomy_class: HUMAN_GATED
    human_review_required: true
    evidence_lineage_required: true
    required_evidence_fields:
      - source_uri
      - retrieval_timestamp
      - evidence_hash
    required_approver_role: "Authorizing Official or Delegate"
    allowed_actions:
      - "s3:PutObject"
    prohibited_actions:
      - "s3:DeleteObject"
      - "s3:PutBucketPolicy"
    data_classifications_allowed:
      - UNCLASSIFIED
    policy_enforcement_points:
      pre_call: "require_human_approval_token"
      post_call: "log_submission_event"
    max_calls_per_run: 1
    timeout_seconds: 30
    audit_retention_days: 2555

  - tool_id: "T-003"
    tool_name: "modify_iam_policy"
    description: "Creates, modifies, or deletes IAM policies."
    risk_tier: CRITICAL
    autonomy_class: DENIED
    human_review_required: null
    evidence_lineage_required: null
    required_approver_role: null
    allowed_actions: []
    prohibited_actions:
      - "iam:*"
    data_classifications_allowed: []
    policy_enforcement_points:
      pre_call: "reject_log_and_alert"
      post_call: null
    max_calls_per_run: 0
    timeout_seconds: 0
    audit_retention_days: 365
