name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ eval/ scripts/ --max-line-length=100 \
            --exclude=venv,.venv,__pycache__

      - name: Run deterministic graders (no LLM calls)
        run: |
          python -c "
          from eval.scenarios.failure_modes import (
              fm_001_hallucinated_assertion,
              fm_002_incomplete_evidence,
              fm_003_reasoning_loop,
              fm_004_tool_timeout,
              fm_005_sufficiency_gate_bypass,
              fm_007_stale_evidence,
          )
          results = [
              fm_001_hallucinated_assertion.run(),
              fm_002_incomplete_evidence.run(),
              fm_003_reasoning_loop.run(),
              fm_004_tool_timeout.run(),
              fm_005_sufficiency_gate_bypass.run(),
              fm_007_stale_evidence.run(),
          ]
          passed = sum(1 for r in results if r.get('passed'))
          total = len(results)
          print(f'Deterministic graders: {passed}/{total} passed')
          assert passed == total, f'FAIL: {passed}/{total}'
          "
